<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Store</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="navbar">
<h1 class="logo">Online Store</h1>
<input type="text" id="search" placeholder="Search products...">
</header>
  
  <div class="categories">

<button onclick="filterCategory('All')">All</button>

<button onclick="filterCategory('smartphones')">Phones</button>
<button onclick="filterCategory('laptops')">Laptops</button>
<button onclick="filterCategory('fragrances')">Perfumes</button>
<button onclick="filterCategory('skincare')">Skincare</button>
<button onclick="filterCategory('groceries')">Groceries</button>
<button onclick="filterCategory('home-decoration')">Home</button>

</div>
<div class="filters">

<select onchange="sortProducts(this.value)">
<option value="">Sort By</option>
<option value="low">Price Low to High</option>
<option value="high">Price High to Low</option>
<option value="rating">Rating High to Low</option>
</select>

<select onchange="filterPrice(this.value)">
<option value="">Price Range</option>
<option value="low">Under ₹500</option>
<option value="mid">₹500 - ₹2000</option>
<option value="high">Above ₹2000</option>
</select>

<select onchange="filterRating(this.value)">
<option value="">Rating</option>
<option value="4">4★ & above</option>
<option value="3">3★ & above</option>
</select>

</div>

<div class="product-container" id="productContainer"></div>

<script src="script.js"></script>

</body>

</html>
